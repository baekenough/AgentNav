server {
    listen 80;
    charset utf-8;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/markdown text/xml application/json application/xml;
    gzip_min_length 256;

    types {
        text/html       html htm;
        text/plain      txt;
        text/markdown   md;
        application/json json;
        application/xml xml;
    }

    # CORS and cache headers
    add_header Access-Control-Allow-Origin * always;
    add_header Cache-Control "no-cache" always;

    # Query parameter redirect: /?docs=claude-code → /claude-code/
    if ($arg_docs) {
        return 301 /$arg_docs/;
    }

    # Backward compatibility: /.well-known/agents.* → /claude-code/agents.*
    location ~ ^/\.well-known/agents\.(json|md|xml|txt)$ {
        return 301 /claude-code/agents.$1;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
