name: Sync Documentation

on:
  schedule:
    # Every 6 hours: UTC 0, 6, 12, 18
    - cron: "0 0,6,12,18 * * *"

  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "check"
        type: choice
        options:
          - check
          - regenerate
          - deploy

  push:
    branches: [main]
    paths:
      - "public/*/agents.json"

concurrency:
  group: sync-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

env:
  DOCKER_IMAGE: agentnav
  PYTHON_VERSION: "3.12"

jobs:
  # ===========================================================================
  # Job 1: Detect upstream documentation changes
  # Runs on: schedule, manual "check"
  # ===========================================================================
  detect-changes:
    name: Detect Documentation Changes
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'check')
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore hash cache
        uses: actions/cache/restore@v4
        with:
          path: scripts/.cache
          key: doc-hashes-${{ github.sha }}
          restore-keys: doc-hashes-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt
        timeout-minutes: 2

      - name: Run change detection
        id: detect
        run: |
          mkdir -p scripts/.cache
          python scripts/detect_changes.py --verbose 2>&1 | tee /tmp/detect-output.txt || true
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

          # Parse detection result
          if grep -q "CHANGES_DETECTED=true" /tmp/detect-output.txt; then
            echo "changes_detected=true" >> "$GITHUB_OUTPUT"
            # Extract report body (everything between REPORT_START and REPORT_END markers)
            sed -n '/^REPORT_START$/,/^REPORT_END$/{ /^REPORT_START$/d; /^REPORT_END$/d; p }' \
              /tmp/detect-output.txt > /tmp/report-body.txt
          else
            echo "changes_detected=false" >> "$GITHUB_OUTPUT"
          fi
        timeout-minutes: 5

      - name: Create GitHub Issue on changes
        if: steps.detect.outputs.changes_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_EVENT: ${{ github.event_name }}
        run: |
          # Read source name from detection output, fallback to generic
          SOURCE_NAME=$(grep "^SOURCE_NAME=" /tmp/detect-output.txt | cut -d= -f2 || echo "upstream")
          REPORT_BODY=$(cat /tmp/report-body.txt 2>/dev/null || echo "Documentation changes detected. Run regenerate to update formats.")
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Check for existing open issue to avoid duplicates
          EXISTING=$(gh issue list \
            --label "doc-update,automated" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "Appending to existing issue #${EXISTING}"
            COMMENT_BODY=$(cat <<EOF
          ## Update detected — ${TIMESTAMP}

          ${REPORT_BODY}
          EOF
          )
            gh issue comment "$EXISTING" --body "$COMMENT_BODY"
          else
            ISSUE_BODY=$(cat <<EOF
          ## Documentation Change Report

          **Detected at**: ${TIMESTAMP}
          **Source**: ${SOURCE_NAME}
          **Triggered by**: ${WORKFLOW_EVENT}

          ---

          ${REPORT_BODY}

          ---

          ### Next Steps

          1. Review the changes above
          2. Run workflow_dispatch with action=regenerate to update all formats
          3. Run workflow_dispatch with action=deploy to deploy to production

          _This issue was created automatically by the sync-docs workflow._
          EOF
          )
            gh issue create \
              --title "Documentation update detected — ${SOURCE_NAME}" \
              --body "$ISSUE_BODY" \
              --label "doc-update,automated"
          fi
        timeout-minutes: 2

      - name: Save hash cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: scripts/.cache
          key: doc-hashes-${{ github.sha }}

  # ===========================================================================
  # Job 2: Regenerate all agents.* formats from agents.json
  # Runs on: manual "regenerate", manual "deploy", push to public/*/agents.json
  # ===========================================================================
  regenerate-formats:
    name: Regenerate Formats
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'regenerate') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')
    timeout-minutes: 10
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate all formats from JSON
        run: python scripts/generate_formats.py --all
        timeout-minutes: 5

      - name: Check for changes and commit
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet && git diff --cached --quiet; then
            echo "No format changes detected"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git add public/
            git commit -m "chore: regenerate agents formats from JSON"
            git push
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi
        timeout-minutes: 2

  # ===========================================================================
  # Job 3: Build Docker image and deploy to remote server
  # Runs on: manual "deploy", or after successful regenerate with changes
  # ===========================================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [regenerate-formats]
    if: >-
      always() &&
      (needs.regenerate-formats.result == 'success' || needs.regenerate-formats.result == 'skipped') &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy') ||
        (github.event_name == 'push' && needs.regenerate-formats.outputs.has_changes == 'true')
      )
    timeout-minutes: 15
    environment: production

    steps:
      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        timeout-minutes: 1

      - name: Deploy on remote server
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_PORT: ${{ secrets.DEPLOY_PORT }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          IMAGE_NAME: ${{ env.DOCKER_IMAGE }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            "${SSH_USER}@${SSH_HOST}" \
            "cd ~/agentnav && \
             git pull && \
             docker build -t ${IMAGE_NAME}:latest . && \
             docker stop agentnav 2>/dev/null || true && \
             docker rm agentnav 2>/dev/null || true && \
             docker run -d \
               --name agentnav \
               --restart unless-stopped \
               -p 8080:80 \
               ${IMAGE_NAME}:latest && \
             echo 'Deployed successfully at $(date -u)'"
        timeout-minutes: 10

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Verify deployment
        if: success()
        continue-on-error: true
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_PORT: ${{ secrets.DEPLOY_PORT }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          sleep 5
          STATUS=$(ssh -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            "${SSH_USER}@${SSH_HOST}" \
            'docker ps --filter name=agentnav --format "{{.Status}}"')
          if echo "$STATUS" | grep -q "Up"; then
            echo "Container is running"
          else
            echo "Container is not running"
            exit 1
          fi
        timeout-minutes: 1
