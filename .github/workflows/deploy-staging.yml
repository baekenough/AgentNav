name: deploy-staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "배포할 커밋 SHA (비우면 현재 ref)"
        required: false
        type: string
      issue_id:
        description: "OpenClaw issue id (선택)"
        required: false
        type: string

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: staging

    steps:
      - name: Resolve deploy SHA
        id: vars
        run: |
          if [ -n "${{ inputs.sha }}" ]; then
            echo "sha=${{ inputs.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout target SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.sha }}

      - name: Ensure deploy scripts executable
        run: |
          chmod +x scripts/deploy_staging.sh scripts/healthcheck_staging.sh

      - name: Deploy staging
        env:
          DEPLOY_SHA: ${{ steps.vars.outputs.sha }}
          OPENCLOW_ISSUE_ID: ${{ inputs.issue_id }}
        run: |
          ./scripts/deploy_staging.sh "$DEPLOY_SHA"

      - name: Health check staging
        run: |
          ./scripts/healthcheck_staging.sh

      - name: Publish summary
        run: |
          {
            echo "## Staging Deployment Result";
            echo "- SHA: \`${{ steps.vars.outputs.sha }}\`";
            echo "- Issue: \`${{ inputs.issue_id || 'N/A' }}\`";
            echo "- Status: ✅ succeeded";
          } >> "$GITHUB_STEP_SUMMARY"
