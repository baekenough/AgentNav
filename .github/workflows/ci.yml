name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Lint
        run: make lint

      - name: Typecheck
        run: make typecheck

      - name: Unit tests
        run: make test

      - name: Smoke test
        run: python scripts/run_smoke.py --suite quick

      - name: Navigation benchmark
        run: python scripts/run_nav_benchmark.py --suite pr-gate --output report.json

      - name: Evaluate benchmark gate
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          baseline_path = 'benchmarks/baseline/pr-gate-baseline.json'
          report_path = 'report.json'

          if not os.path.exists(report_path):
            print('::error::report.json not found')
            sys.exit(1)

          if not os.path.exists(baseline_path):
            print(f'::error::baseline missing: {baseline_path}')
            sys.exit(1)

          base = json.load(open(baseline_path, 'r', encoding='utf-8'))
          cur = json.load(open(report_path, 'r', encoding='utf-8'))

          def f(d, k, default=0.0):
            v = d.get(k, default)
            return float(v if v is not None else default)

          sr_base = f(base, 'success_rate')
          sr_cur = f(cur, 'success_rate')
          cost_base = f(base, 'avg_cost')
          cost_cur = f(cur, 'avg_cost')
          lat_base = f(base, 'avg_latency_ms')
          lat_cur = f(cur, 'avg_latency_ms')
          crash = int(cur.get('crash_count', 0) or 0)

          sr_delta = sr_cur - sr_base
          cost_ratio = (cost_cur / cost_base) if cost_base > 0 else 1.0
          lat_ratio = (lat_cur / lat_base) if lat_base > 0 else 1.0

          failures = []
          if sr_delta < -5.0:
            failures.append(f'success_rate drop too high: {sr_delta:.2f}p (threshold -5.0p)')
          if cost_ratio > 1.20:
            failures.append(f'avg_cost increased too high: x{cost_ratio:.3f} (threshold 1.20)')
          if lat_ratio > 1.30:
            failures.append(f'avg_latency_ms increased too high: x{lat_ratio:.3f} (threshold 1.30)')
          if crash >= 1:
            failures.append(f'crash_count={crash} (threshold 0)')

          summary = []
          summary.append('### Navigation Benchmark Gate')
          summary.append('')
          summary.append(f'- success_rate: baseline={sr_base:.2f}, current={sr_cur:.2f}, delta={sr_delta:+.2f}p')
          summary.append(f'- avg_cost: baseline={cost_base:.4f}, current={cost_cur:.4f}, ratio={cost_ratio:.3f}')
          summary.append(f'- avg_latency_ms: baseline={lat_base:.2f}, current={lat_cur:.2f}, ratio={lat_ratio:.3f}')
          summary.append(f'- crash_count: {crash}')
          summary.append('')

          if failures:
            summary.append('**Gate Result: FAIL**')
            summary.extend([f'- {x}' for x in failures])
            open('benchmark-summary.md', 'w', encoding='utf-8').write('\n'.join(summary) + '\n')
            print('::error::benchmark gate failed')
            for x in failures:
              print(f'::error::{x}')
            sys.exit(1)

          summary.append('**Gate Result: PASS**')
          open('benchmark-summary.md', 'w', encoding='utf-8').write('\n'.join(summary) + '\n')
          print('benchmark gate passed')
          PY

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav-benchmark-report
          path: |
            report.json
            benchmark-summary.md

      - name: Add summary
        if: always()
        run: |
          if [ -f benchmark-summary.md ]; then
            cat benchmark-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
