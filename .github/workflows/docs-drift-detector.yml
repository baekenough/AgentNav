name: Docs Drift Detector

on:
  schedule:
    - cron: '0 0,8,16 * * *'  # 3x daily at 00/08/16 UTC (09/17/01 KST)
  workflow_dispatch:

permissions:
  issues: write
  contents: write  # For baseline update commits

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run drift detection
        run: python scripts/detect_drift.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit baseline updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/baselines/
          git diff --cached --quiet || git commit -m "chore: update drift detection baselines"
          git push
