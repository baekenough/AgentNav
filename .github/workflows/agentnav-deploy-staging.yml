name: agentnav-deploy-staging

on:
  workflow_dispatch:
    inputs:
      sha:
        required: true
        type: string
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.sha || github.sha }}

      - name: Validate required staging scripts
        run: |
          test -x scripts/deploy_staging.sh || { echo "scripts/deploy_staging.sh missing or not executable"; exit 1; }
          test -x scripts/healthcheck_staging.sh || { echo "scripts/healthcheck_staging.sh missing or not executable"; exit 1; }

      - name: Deploy to staging
        run: ./scripts/deploy_staging.sh ${{ github.event.inputs.sha || github.sha }}

      - name: Health check
        run: ./scripts/healthcheck_staging.sh

      - name: Close linked issues after successful staging deploy
        if: ${{ github.event_name == 'push' }}
        uses: actions/github-script@v7
        with:
          script: |
            const msg = context.payload.head_commit?.message || "";
            const keywordRegex = /(close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const issueNumbers = [...msg.matchAll(keywordRegex)].map(m => Number(m[2]));
            const uniq = [...new Set(issueNumbers)].filter(Boolean);

            if (uniq.length === 0) {
              core.info('No closing keywords found in head commit message.');
              return;
            }

            for (const issue_number of uniq) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                state: 'closed',
                state_reason: 'completed',
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body: `✅ Staging deploy succeeded on commit \`${context.sha}\`. Closing automatically.`,
              });

              core.info(`Closed issue #${issue_number}`);
            }
