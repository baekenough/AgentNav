name: agentnav-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (if present)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found, skip"
          fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            echo "requirements-dev.txt not found, skip"
          fi

      - name: Lint (optional)
        run: |
          if [ -f Makefile ] && grep -qE '^lint:' Makefile; then
            make lint
          else
            echo "lint target not found, skip"
          fi

      - name: Typecheck (optional)
        run: |
          if [ -f Makefile ] && grep -qE '^typecheck:' Makefile; then
            make typecheck
          else
            echo "typecheck target not found, skip"
          fi

      - name: Unit tests (optional)
        run: |
          if [ -f Makefile ] && grep -qE '^test:' Makefile; then
            make test
          else
            echo "test target not found, skip"
          fi

      - name: Quick smoke (optional)
        run: |
          if [ -f scripts/run_smoke.py ]; then
            python scripts/run_smoke.py --suite quick-smoke
          else
            echo "scripts/run_smoke.py not found, skip"
          fi

      - name: Benchmark gate (optional)
        run: |
          if [ -f scripts/run_nav_benchmark.py ]; then
            python scripts/run_nav_benchmark.py --suite pr-gate --output benchmark-report.json
          else
            echo "scripts/run_nav_benchmark.py not found, skip"
          fi

      - name: Upload benchmark artifact (if generated)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmark-report.json
          if-no-files-found: ignore
